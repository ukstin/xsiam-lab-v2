name: Deployment xsiam-lab v2

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'configuration.json'
      - '*.png'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'configuration.json'
      - '*.png'

permissions:
  contents: read

env:
    CORTEX_API_KEY: ${{secrets.CORTEX_API_KEY}}
    CORTEX_API_KEY_ID: ${{secrets.CORTEX_API_KEY_ID}}
    CORTEX_API_URL: https://xsiam-latam-dcs.xdr.us.paloaltonetworks.com/

jobs:
  cortex_code_scan:
    runs-on: ubuntu-latest
    name: Cortex Code Scan
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

